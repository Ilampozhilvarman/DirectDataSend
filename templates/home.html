<!doctype html>
<html>
    <head>
        <title>Home</title>
    </head>
    <style>
        .contact {
            background-color: gray;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            position: relative;
        }
        @property --angle {
            syntax: "<deg>";
            initial-value: 0deg;
            inherits: false;
        }
        @keyframes fadeIn {
            to {
                --angle: 360deg;
            }
        }
        .contact::after {
            content: "";
            inset: -10px;
            position: absolute;
            background-image: conic-gradient(
                from var(--angle),
                red,
                orange,
                yellow,
                green,
                blue,
                indigo,
                violet
            );
            border-radius: 15px;
            animation: fadeIn 5s linear infinite;
        }
        button {
            background-color: #4caf50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        body {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: black;
        }
    </style>
    <body>
        <div class="contact">
            <h2>Create a new contact</h2>
        </div>
        {% for contact in contacts %}
        <div class="contact">
            <h2>{{ contact.name }}</h2>
            <button>Send</button>
            <button>View</button>
        </div>
        {% endfor %}
    </body>
</html>
